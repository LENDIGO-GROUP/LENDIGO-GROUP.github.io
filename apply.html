    <script>
    function showModal(msg) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('summary').innerHTML = msg.replace(/%0A/g, '<br>');
    }
    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
        document.getElementById('confirmation').style.display = 'none';
    }
    function submitLoanForm() {
        var n = document.getElementById('name').value;
        var p = document.getElementById('phone').value;
        var e = document.getElementById('email').value;
        var t = document.getElementById('type').value;
        var a = document.getElementById('amount').value;
        var msg =
            'New Loan Application:%0A' +
            'Name: ' + n + '%0A' +
            'Phone: ' + p + '%0A' +
            'Email: ' + e + '%0A' +
            'Loan Type: ' + t + '%0A' +
            'Amount: ' + a;
        showModal(msg);
    }
    </script>
</head>

<header>
    <img src="logo.JPG" class="logo-circle" alt="LENDIGO Logo href="productsucts</a>

</header>
<main>
    <h1>Apply for a Loan</h1>
    <form class="apply-form" onsubmit="event.preventDefault(); submitLoanForm();">
        <label>Name</label>
        <input id="name" required>
        <label>Phone</label>
        <input id="phone" required>
        <label>Email</label>
        <input id="email">

        <label>Loan Type</label>
        <select id="type">
            <option>Salary Loans</option>
            <option>Logbook Loans</option>
            <option>LPO Financing</option>
            <option>Business Loans</option>
            <option>Personal Loans</option>
            <option>Study Loans</option>
        </select>
        <label>Amount</label>
        <input id="amount" type="number" required>
        <button class="btn">Submit</button>
    </form>
</main>
<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
    <h2>Almost Done! Choose How to Send</h2>
    <p id="summary"></p>
    <button class="btn whats"
        onclick="window.open('https://wa.me/256704679882?text=' + encodeURIComponent(document.getElementById('summary').innerText), '_blank');
                 document.getElementById('confirmation').style.display='block';">
        WhatsApp
    </button>

    <button class="btn emailbtn"
        onclick="window.open('mailto:mn.wewoolefinancialservices@gmail.com?subject=New Loan Application&body=' + encodeURIComponent(document.getElementById('summary').innerText), '_blank');
                 document.getElementById('confirmation').style.display='block';">
        Email
    </button>

    <p id="confirmation" style="display:none;color:green;font-weight:700;margin-top:15px;">
        Your application has been submitted successfully!
    </p>
    <button class="btn closebtn" onclick="closeModal()">Close</button>
</div>
